<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zulfiqar Music Player</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .player { background: #181818; padding: 25px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; }
        .logo { font-size: 50px; margin-bottom: 10px; }
        h2 { color: #1DB954; margin: 10px 0; font-size: 1.1rem; }
        audio { width: 100%; margin-top: 15px; height: 35px; border-radius: 5px; }
        .playlist { margin-top: 20px; max-height: 200px; overflow-y: auto; text-align: right; }
        .song-btn { background: #282828; padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; border: none; color: white; width: 100%; }
        .song-btn:hover { background: #3e3e3e; color: #1DB954; }
        .song-btn i { font-size: 0.8rem; color: #1DB954; }
    </style>
</head>
<body>

<div class="player">
    <div class="logo">🎧</div>
    <h2 id="currentTitle">اختر أغنية للبدء</h2>
    
    <audio id="mainAudio" controls>
        <source src="" type="audio/mpeg">
    </audio>

    <div class="playlist">
        <button class="song-btn" onclick="playSong('موسيقى حماسية 1', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">◀️ موسيقى حماسية رقم 1</button>
        <button class="song-btn" onclick="playSong('موسيقى هادئة 2', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3')">◀️ موسيقى هادئة رقم 2</button>
        <button class="song-btn" onclick="playSong('تجربة عزف بيانو', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3')">◀️ عزف بيانو رايق</button>
        <button class="song-btn" onclick="playSong('موسيقى عالمية', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3')">◀️ موسيقى عالمية</button>
    </div>
</div>

<script>
    function playSong(name, url) {
        var audio = document.getElementById('mainAudio');
        var title = document.getElementById('currentTitle');
        audio.src = url;
        title.innerText = "تشغيل الآن: " + name;
        audio.play();
    }
</script>

</body>
</html>
